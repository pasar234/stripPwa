<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Strip Pro Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Gaya untuk Zoom Foto */
        .zoom-container {
            overflow: hidden;
            cursor: grab;
        }
        .zoom-container img {
            transition: transform 0.2s ease;
            transform-origin: center;
        }
        .zoom-container img:active {
            cursor: grabbing;
            transform: scale(2.5); /* Perbesaran saat ditekan */
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg">
        <div class="bg-blue-600 p-4 text-white sticky top-0 z-10 shadow-md">
            <h1 class="text-xl font-bold text-center">STOK STRIP PRO</h1>
            <p class="text-xs text-center opacity-80">Cloud System - Realtime</p>
        </div>

        <div class="p-4 border-b bg-blue-50">
            <div class="space-y-3">
                <input type="text" id="namaBarang" placeholder="Nama Striping..." class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                
                <div class="flex gap-2">
                    <input type="number" id="jumlahStok" placeholder="Stok" class="w-1/3 p-3 border rounded-lg outline-none">
                    <label class="w-2/3 flex items-center justify-center bg-white border-2 border-dashed border-blue-300 rounded-lg cursor-pointer hover:bg-blue-100">
                        <span class="text-sm text-blue-600" id="labelFoto">📸 Tambah Foto</span>
                        <input type="file" id="inputFoto" accept="image/*" class="hidden" onchange="previewImage(this)">
                    </label>
                </div>
                
                <div id="previewContainer" class="hidden relative w-20 h-20 border rounded">
                    <img id="imgPreview" class="w-full h-full object-cover rounded">
                    <button onclick="hapusPreview()" class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-5 h-5 text-xs text-center">X</button>
                </div>

                <button onclick="simpanData()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold shadow-lg active:scale-95 transition">
                    SIMPAN PRODUK
                </button>
            </div>
        </div>

        <div class="p-4">
            <input type="text" id="cariBarang" onkeyup="filterBarang()" placeholder="🔍 Cari nama striping..." class="w-full p-2 border-b outline-none focus:border-blue-600">
        </div>

        <div id="daftarStok" class="p-4 space-y-4">
            <p class="text-center text-gray-400 italic">Memuat data dari cloud...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA_5FPWuq3YwP0b3pUouhTLE87WFlmoIIU",
            authDomain: "striping-57c17.firebaseapp.com",
            databaseURL: "https://striping-57c17-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "striping-57c17",
            storageBucket: "striping-57c17.firebasestorage.app",
            messagingSenderId: "1052266029221",
            appId: "1:1052266029221:web:02b74ab13c787c90f02d4c",
            measurementId: "G-2WTTSQ33GT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let base64Image = "";

        // Preview Foto & Convert ke Base64
        window.previewImage = function(input) {
            const file = input.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    base64Image = e.target.result;
                    document.getElementById('imgPreview').src = base64Image;
                    document.getElementById('previewContainer').classList.remove('hidden');
                    document.getElementById('labelFoto').innerText = "✅ Foto Siap";
                };
                reader.readAsDataURL(file);
            }
        };

        window.hapusPreview = function() {
            base64Image = "";
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('labelFoto').innerText = "📸 Tambah Foto";
            document.getElementById('inputFoto').value = "";
        };

        // Simpan Data
        window.simpanData = function() {
            const nama = document.getElementById('namaBarang').value;
            const stok = document.getElementById('jumlahStok').value;

            if(nama && stok) {
                const listRef = ref(db, 'stok_barang');
                push(listRef, {
                    nama: nama,
                    jumlah: parseInt(stok),
                    foto: base64Image,
                    waktu: Date.now()
                }).then(() => {
                    document.getElementById('namaBarang').value = '';
                    document.getElementById('jumlahStok').value = '';
                    hapusPreview();
                });
            } else {
                alert("Mohon isi Nama dan Stok!");
            }
        };

        // Tampilkan Data Realtime
        onValue(ref(db, 'stok_barang'), (snapshot) => {
            const container = document.getElementById('daftarStok');
            container.innerHTML = "";
            const data = snapshot.val();

            if (data) {
                Object.keys(data).reverse().forEach(key => {
                    const item = data[key];
                    container.innerHTML += `
                        <div class="item-card bg-white border rounded-xl overflow-hidden shadow-sm flex flex-col">
                            <div class="zoom-container h-48 bg-gray-200">
                                <img src="${item.foto || 'https://via.placeholder.com/300?text=No+Image'}" 
                                     class="w-full h-full object-contain" 
                                     onclick="handleZoom(this)"
                                     title="Tekan dan geser untuk zoom">
                            </div>
                            <div class="p-3">
                                <div class="flex justify-between items-start">
                                    <h4 class="font-bold text-lg text-gray-800 uppercase">${item.nama}</h4>
                                    <span class="bg-blue-100 text-blue-700 font-bold px-3 py-1 rounded-full text-sm">Stok: ${item.jumlah}</span>
                                </div>
                                <div class="flex gap-2 mt-4">
                                    <button onclick="ubahStok('${key}', ${item.jumlah}, 1)" class="flex-1 bg-green-500 text-white py-2 rounded-lg font-bold">+ Tambah</button>
                                    <button onclick="ubahStok('${key}', ${item.jumlah}, -1)" class="flex-1 bg-orange-500 text-white py-2 rounded-lg font-bold">- Kurangi</button>
                                    <button onclick="hapusBarang('${key}')" class="p-2 text-red-500 border border-red-200 rounded-lg text-sm font-bold">Hapus</button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = "<p class='text-center text-gray-400'>Belum ada barang.</p>";
            }
        });

        // Edit Stok (+/-)
        window.ubahStok = function(key, stokLama, perubahan) {
            const stokBaru = stokLama + perubahan;
            if (stokBaru < 0) return;
            update(ref(db, 'stok_barang/' + key), { jumlah: stokBaru });
        };

        // Hapus Barang
        window.hapusBarang = function(key) {
            if(confirm("Hapus barang dari cloud?")) {
                remove(ref(db, 'stok_barang/' + key));
            }
        };

        // Filter Pencarian
        window.filterBarang = function() {
            const input = document.getElementById('cariBarang').value.toUpperCase();
            const cards = document.getElementsByClassName('item-card');
            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].getElementsByTagName("h4")[0];
                if (title.innerText.toUpperCase().indexOf(input) > -1) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        };

        // Fitur Zoom Manual (Sederhana)
        window.handleZoom = function(img) {
            // Memberikan efek visual bahwa foto bisa dizoom saat di-tap/klik
            if(img.style.transform === "scale(2)") {
                img.style.transform = "scale(1)";
                img.parentElement.style.overflow = "hidden";
            } else {
                img.style.transform = "scale(2)";
                img.parentElement.style.overflow = "scroll"; // Bisa digeser manual setelah zoom
            }
        };
    </script>
</body>
</html>
