<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Strip Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4">

    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-bold mb-4 text-center text-blue-600">Input Stok Striping</h2>
        
        <div class="space-y-3">
            <input type="text" id="namaBarang" placeholder="Nama Produk / Striping" class="w-full p-2 border rounded focus:outline-blue-500">
            <input type="number" id="jumlahStok" placeholder="Jumlah Stok" class="w-full p-2 border rounded focus:outline-blue-500">
            <button onclick="simpanData()" class="w-full bg-blue-600 text-white p-2 rounded-lg font-bold hover:bg-blue-700 transition">
                Simpan ke Cloud
            </button>
        </div>

        <hr class="my-6">

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-gray-700">Daftar Stok Realtime:</h3>
            <span id="status" class="text-xs text-green-500 font-medium italic">Online</span>
        </div>
        
        <div id="daftarStok" class="space-y-2">
            <p class="text-gray-400 text-sm text-center">Memuat data...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove } 
        from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Konfigurasi milik Anda
        const firebaseConfig = {
            apiKey: "AIzaSyA_5FPWuq3YwP0b3pUouhTLE87WFlmoIIU",
            authDomain: "striping-57c17.firebaseapp.com",
            databaseURL: "https://striping-57c17-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "striping-57c17",
            storageBucket: "striping-57c17.firebasestorage.app",
            messagingSenderId: "1052266029221",
            appId: "1:1052266029221:web:02b74ab13c787c90f02d4c",
            measurementId: "G-2WTTSQ33GT"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Fungsi Simpan (Dibuat Global agar bisa dipanggil onclick)
        window.simpanData = function() {
            const nama = document.getElementById('namaBarang').value;
            const stok = document.getElementById('jumlahStok').value;

            if(nama && stok) {
                const listRef = ref(db, 'stok_barang');
                const dataBaruRef = push(listRef);
                set(dataBaruRef, {
                    nama: nama,
                    jumlah: stok,
                    waktu: Date.now()
                }).then(() => {
                    // Reset input setelah simpan
                    document.getElementById('namaBarang').value = '';
                    document.getElementById('jumlahStok').value = '';
                }).catch((error) => {
                    alert("Gagal simpan: " + error.message);
                });
            } else {
                alert("Isi nama dan jumlah dulu ya!");
            }
        };

        // Ambil Data Secara Realtime
        const dbRef = ref(db, 'stok_barang');
        onValue(dbRef, (snapshot) => {
            const container = document.getElementById('daftarStok');
            container.innerHTML = "";
            const data = snapshot.val();

            if (data) {
                // Mengubah objek menjadi array dan mengurutkan berdasarkan waktu terbaru
                const keys = Object.keys(data).reverse(); 
                
                keys.forEach(key => {
                    const item = data[key];
                    container.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-gray-50 border-l-4 border-blue-500 rounded shadow-sm">
                            <div>
                                <div class="font-bold text-gray-800">${item.nama}</div>
                                <div class="text-sm text-gray-500">Stok: <span class="text-blue-600 font-bold">${item.jumlah}</span></div>
                            </div>
                            <button onclick="hapusData('${key}')" class="bg-red-100 text-red-600 px-3 py-1 rounded-md text-sm hover:bg-red-200 transition">
                                Hapus
                            </button>
                        </div>
                    `;
                });
            } else {
                container.innerHTML = `<div class="text-center py-4 text-gray-400 italic">Belum ada stok barang.</div>`;
            }
        });

        // Fungsi Hapus
        window.hapusData = function(key) {
            if(confirm("Yakin ingin menghapus produk ini?")) {
                remove(ref(db, 'stok_barang/' + key));
            }
        }
    </script>
</body>
</html>
