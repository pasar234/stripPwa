<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stok Strip Pro - No Password</title>
    <style>
        /* FIX TOTAL SCROLL */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        html, body { 
            height: 100%; 
            background: #f8fafc; 
            /* Menghilangkan pengunci scroll */
            overflow-y: auto !important; 
            -webkit-overflow-scrolling: touch;
        }
        
        body { 
            display: flex; 
            flex-direction: column; 
        }

        /* HEADER TETAP DI ATAS */
        .header { 
            background: #3b5998; 
            color: white; 
            padding: 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* KONTEN UTAMA */
        #main-content { 
            flex: 1;
            padding: 15px; 
            /* Memastikan area konten bisa memanjang ke bawah */
            display: block; 
        }

        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
            border-left: 5px solid #3b5998;
        }

        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; }
        
        .menu-dropdown { 
            display: none; position: absolute; top: 60px; right: 15px; 
            background: white; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); 
            z-index: 1001; min-width: 220px; overflow: hidden;
        }
        .menu-dropdown.show { display: block; }
        .menu-item { padding: 15px; border-bottom: 1px solid #f1f5f9; color: #333; cursor: pointer; font-size: 14px; }
        .menu-item:active { background: #f1f5f9; }

        .add-btn { 
            background: #28a745; color: white; padding: 15px; border-radius: 12px; 
            text-align: center; font-weight: bold; margin-bottom: 20px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .item-info h3 { font-size: 18px; color: #1e293b; margin-bottom: 5px; }
        .item-info p { color: #64748b; font-size: 14px; }
        
        .delete-btn {
            background: #fee2e2; color: #ef4444; border: none; 
            padding: 8px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;
        }

        /* Spacer agar item terakhir tidak tertutup tombol navigasi HP */
        .footer-spacer { height: 100px; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: bold; font-size: 18px;">STOK STRIP PRO</div>
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        <div id="menuDropdown" class="menu-dropdown">
            <div class="menu-item" onclick="backupToClipboard()">📤 Backup ke Clipboard</div>
            <div class="menu-item" onclick="restoreFromClipboard()">📥 Restore dari Clipboard</div>
            <div class="menu-item" onclick="backupToFile()">💾 Backup ke File</div>
            <div class="menu-item" onclick="restoreFromFile()">📂 Restore dari File</div>
            <div class="menu-item" onclick="location.reload()" style="color: red;">🔄 Segarkan Aplikasi</div>
        </div>
    </div>

    <div id="main-content">
        <div class="add-btn" onclick="tambahBarang()">➕ TAMBAH BARANG BARU</div>
        <div id="item-list">
            </div>
        <div class="footer-spacer"></div>
    </div>

<script>
    const STORAGE_KEY = 'stok_strip_data_final';
    let database = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // Langsung Render (Tanpa Password)
    render();

    function toggleMenu() {
        document.getElementById('menuDropdown').classList.toggle('show');
    }

    function render() {
        const list = document.getElementById('item-list');
        list.innerHTML = '';
        
        if (database.length === 0) {
            list.innerHTML = '<div style="text-align:center; padding:40px; color:#94a3b8;">Data masih kosong.</div>';
            return;
        }

        database.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="item-info">
                        <h3>${item.nama}</h3>
                        <p>Jumlah Stok: ${item.stok}</p>
                    </div>
                    <button class="delete-btn" onclick="hapusBarang(${index})">Hapus</button>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function tambahBarang() {
        const nama = prompt("Nama Barang:");
        const stok = prompt("Jumlah Stok:", "0");
        if (nama) {
            database.push({ nama: nama, stok: stok });
            simpanKeMemory();
        }
    }

    function hapusBarang(index) {
        if (confirm("Hapus barang ini?")) {
            database.splice(index, 1);
            simpanKeMemory();
        }
    }

    function simpanKeMemory() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(database));
        render();
    }

    // FITUR BACKUP & RESTORE
    function backupToFile() {
        const blob = new Blob([JSON.stringify(database)], { type: 'application/octet-stream' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'stok_strip_backup.sqlite';
        a.click();
    }

    function restoreFromFile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = ev => {
                database = JSON.parse(ev.target.result);
                simpanKeMemory();
                alert("Data Berhasil Dipulihkan!");
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function backupToClipboard() {
        navigator.clipboard.writeText(JSON.stringify(database)).then(() => alert("Data dicopy!"));
    }

    function restoreFromClipboard() {
        const txt = prompt("Tempel data backup:");
        if (txt) { 
            try {
                database = JSON.parse(txt); 
                simpanKeMemory();
            } catch(e) { alert("Data tidak valid!"); }
        }
    }

    // Klik di luar tutup menu
    window.onclick = function(e) {
        if (!e.target.matches('.menu-btn')) {
            document.getElementById('menuDropdown').classList.remove('show');
        }
    };
</script>
</body>
</html>
